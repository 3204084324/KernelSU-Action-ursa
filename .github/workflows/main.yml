name: Build KernelSU for Xiaomi MI 8 (dipper)

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'KernelSU版本 (tag)'
        required: true
        default: 'v1.0.2'
        type: string

env:
  KERNEL_REPO: "https://github.com/LineageOS/android_kernel_xiaomi_sdm845.git"
  KERNEL_BRANCH: "lineage-18.1"
  DEFCONFIG: "sdm845_defconfig"
  CLANG_VERSION: "r365631c"
  DEVICE: "dipper"

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y git make bc bison flex libssl-dev build-essential zip wget

    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_xiaomi_sdm845
        ref: lineage-18.1
        path: kernel

    # 修正后的 Clang 下载步骤
    - name: Setup Clang
      run: |
        mkdir -p clang
        cd clang
        # 使用 master 分支，正确的下载路径
        echo "Downloading Clang ${{ env.CLANG_VERSION }} from AOSP..."
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-${{ env.CLANG_VERSION }}.tar.gz
        if [ $? -ne 0 ]; then
          echo "Failed to download from master branch, trying alternate source..."
          # 备用方案：从 known-good 分支下载
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel-build-2021/clang-${{ env.CLANG_VERSION }}.tar.gz
        fi
        tar -xzf clang-${{ env.CLANG_VERSION }}.tar.gz
        echo "$(pwd)/bin" >> $GITHUB_PATH
        echo "PATH=$(pwd)/bin:$PATH" >> $GITHUB_ENV

    - name: Setup GCC Toolchains
      run: |
        sudo apt install -y gcc-aarch64-linux-gnu

    - name: Integrate KernelSU
      run: |
        cd kernel
        echo "Integrating KernelSU version: ${{ github.event.inputs.kernelsu_version }}"
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_version }}
        echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.DEFCONFIG }}
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/${{ env.DEFCONFIG }}
        echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/${{ env.DEFCONFIG }}
        echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/${{ env.DEFCONFIG }}

    - name: Compile Kernel
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        make ${{ env.DEFCONFIG }}
        make -j$(nproc)

    - name: Setup AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cat > AnyKernel3/anykernel.sh << 'EOF'
        kernel.string=KernelSU for dipper
        do.devicecheck=1
        do.modules=0
        do.cleanup=1
        do.cleanuponabort=1
        device.name1=dipper
        block=boot
        is_slot_device=0
        ramdisk_compression=auto
        patch_vbmeta_flag=auto
        EOF

    - name: Package AnyKernel3
      run: |
        cp kernel/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        if [ -f kernel/arch/arm64/boot/dtbo.img ]; then
          cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/
        fi
        cd AnyKernel3
        zip -r9 ../boot.zip * .[^.]* -x "*.git*" > /dev/null
        cd ..
        echo "Packaging complete."

    - name: Upload boot.zip
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-boot-for-${{ env.DEVICE }}
        path: boot.zip
